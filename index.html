<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Doubles Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="matrixRain"></canvas>
  <div class="scanlines"></div>

  <div class="layout">
    <div class="content">

      <div class="status">
        <span class="status__label">system status</span>
        <div class="status__indicator">
          <svg class="status__power-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Power status">
            <path d="M12 3v9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M7.5 5.6A8 8 0 1 0 16.5 5.6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <p class="subtitle" id="subtitle">there is no spoon. ship it.<span class="cursor">_</span></p>

      <div class="clock" id="countdown">
        <div class="clock__piece" id="hours">
          <div class="clock__card">
            <b class="clock__card-top">00</b>
            <b class="clock__card-bottom" data-value="00"></b>
            <b class="clock__card-back" data-value="00"></b>
            <b class="clock__card-back-bottom" data-value="00"></b>
          </div>
        </div>
        <div class="clock__divider">
          <span class="clock__dot"></span>
          <span class="clock__dot"></span>
        </div>
        <div class="clock__piece" id="minutes">
          <div class="clock__card">
            <b class="clock__card-top">00</b>
            <b class="clock__card-bottom" data-value="00"></b>
            <b class="clock__card-back" data-value="00"></b>
            <b class="clock__card-back-bottom" data-value="00"></b>
          </div>
        </div>
        <div class="clock__divider">
          <span class="clock__dot"></span>
          <span class="clock__dot"></span>
        </div>
        <div class="clock__piece" id="seconds">
          <div class="clock__card">
            <b class="clock__card-top">00</b>
            <b class="clock__card-bottom" data-value="00"></b>
            <b class="clock__card-back" data-value="00"></b>
            <b class="clock__card-back-bottom" data-value="00"></b>
          </div>
        </div>
      </div>

      <div class="bar" id="progressBar">
        <p class="bar__label" id="daysLeft">8 days until the spoon returns</p>
        <div class="bar__segments" id="barSegments"></div>
      </div>
    </div>

    <div class="bottom">
      <span class="bottom__context">tracking claude's 2x usage limits promo · mar 13–28, 2026</span>
      <a class="credit" href="https://github.com/CandyFlex/double-claude" target="_blank" rel="noopener">
        <svg class="credit__icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/>
        </svg>
        <span>@CandyFlex</span>
      </a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
